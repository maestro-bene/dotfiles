# Terminal multiplexer
# https://github.com/tmux/tmux

# =============================================================================
# GENERAL SETTINGS
# =============================================================================

set -g mouse on
set -g default-terminal "tmux-256color"
set-option -ga terminal-overrides ",xterm-256color:RGB"
set -g escape-time 0
set -g history-limit 1000000
set -g status-interval 3
set -g detach-on-destroy off
set -g set-clipboard on
set-option -g focus-events on
set-option -g set-titles on
set-option -g set-titles-string "#{session_name}"

# =============================================================================
# WINDOW OPTIONS
# =============================================================================

set -g base-index 1
set -g renumber-windows on
set-window-option -g mode-keys vi

# =============================================================================
# PANE OPTIONS
# =============================================================================

# (No pane-specific global options here)

# =============================================================================
# KEY BINDINGS
# =============================================================================

# --- Prefix ---
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# --- Panes ---
unbind '"'
unbind %
bind = split-window -v
bind '"' split-window -h
bind -r m resize-pane -Z          # Toggle zoom
bind-key x kill-pane              # Kill pane without confirmation

# Copy-mode (vi) + copy to system clipboard via xclip
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -in -selection clipboard'
unbind -T copy-mode-vi MouseDragEnd1Pane

# --- Windows (create, reorder, pickers, direct select) ---
bind -n M-c new-window -c "#{pane_current_path}"     # Create window in current path
bind -n M-j swap-window -d -t +1                     # Move current window down in index
bind -n M-k swap-window -d -t -1                     # Move current window up in index

# Direct jump to window 1..10 (AZERTY)
bind -n 'M-&' select-window -t 1
bind -n 'M-é' select-window -t 2
bind -n 'M-"' select-window -t 3
bind -n "M-'" select-window -t 4
bind -n 'M-(' select-window -t 5
bind -n 'M--' select-window -t 6
bind -n 'M-è' select-window -t 7
bind -n 'M-_' select-window -t 8
bind -n 'M-ç' select-window -t 9
bind -n 'M-à' select-window -t 10

bind -n M-w choose-tree -Zw -w                        # Interactive window picker (-Z zoom pane, -w windows)
bind -n "M- " last-window                             # Last visited window

# --- Sessions (previous/next, pickers, prompt) ---
bind -n "M-," switch-client -p                        # Previous session
bind -n M-S-s choose-tree -Zw -s                        # Interactive session picker
bind -n M-g command-prompt -I "#S" -p "switch to session:" "switch-client -t '%%'"

# --- Navigation (window navigation) ---
bind -n M-h previous-window
bind -n M-l next-window
# bind -n M-Left  previous-window
# bind -n M-Right next-window

# --- Utilities ---
bind r source-file ~/.tmux.conf                       # Reload tmux config
bind g new-window -n 'lazygit' lazygit                # Lazygit shortcut

# =============================================================================
# STATUS BAR
# =============================================================================

set -g status-style bg=default
set -g status-position top
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_uptime}"
set -agF status-right "#{E:@catppuccin_status_battery}"

# Example (disabled) custom status:
# set -g status-right-length 100
# set -g status-left-length 100
# set -g status-left "#{E:@catppuccin_status_session}"
